<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>知题 - AI 选择题学习工具</title>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#22c55e;--green-dark:#16a34a;--green-light:#dcfce7;
  --red:#ef4444;--red-light:#fef2f2;--orange:#f59e0b;
  --bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;
  --border:#e2e8f0;--shadow:0 2px 12px rgba(0,0,0,.06);
  --radius:14px;--radius-sm:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh}
#app{max-width:520px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

/* Pages */
.page{flex:1;padding:20px 16px 100px}
.page-header{margin-bottom:20px}
.page-header h1{font-size:1.5rem;font-weight:700}
.page-header .subtitle{color:var(--text2);font-size:.85rem;margin-top:4px}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;display:flex;background:var(--card);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,6px);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--text2);font-size:.7rem;padding:4px 0;transition:color .15s}
.nav-item.active,.nav-item:hover{color:var(--green)}
.nav-icon{font-size:1.3rem}
.nav-item.add-btn .nav-icon{width:36px;height:36px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;line-height:1}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red-light);color:var(--red)}
.btn-block{width:100%}
.btn-lg{padding:14px 24px;font-size:1rem;border-radius:var(--radius)}
.btn-back{background:none;border:none;color:var(--text2);font-size:.9rem;cursor:pointer;padding:4px 0}
.btn-group{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:12px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px 12px;text-align:center;box-shadow:var(--shadow)}
.stat-card .stat-value{font-size:1.6rem;font-weight:700;color:var(--green)}
.stat-card .stat-label{font-size:.75rem;color:var(--text2);margin-top:2px}

/* Deck List */
.deck-item{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:transform .1s}
.deck-item:active{transform:scale(.98)}
.deck-info{flex:1}
.deck-name{font-weight:600;font-size:.95rem}
.deck-meta{font-size:.78rem;color:var(--text2);margin-top:3px;display:flex;gap:12px}
.deck-actions{display:flex;gap:6px}
.deck-actions button{padding:6px 12px;border-radius:8px;border:none;font-size:.78rem;cursor:pointer}
.btn-study{background:var(--green);color:#fff}
.btn-delete{background:var(--red-light);color:var(--red)}

/* Upload Zone */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.upload-zone:hover,.upload-zone.active{border-color:var(--green);background:var(--green-light)}
.upload-icon{font-size:2.5rem;margin-bottom:12px}
.upload-zone h3{font-size:1rem;margin-bottom:6px}
.upload-zone p{color:var(--text2);font-size:.85rem}
.upload-zone input{display:none}

/* Preview */
.preview-box{background:var(--bg);border-radius:var(--radius-sm);padding:14px;max-height:200px;overflow-y:auto;font-size:.82rem;line-height:1.6;white-space:pre-wrap;color:var(--text2);margin:12px 0;border:1px solid var(--border)}

/* Quiz Card */
.quiz-card{background:var(--card);border-radius:var(--radius);padding:24px 20px;box-shadow:var(--shadow);margin-top:16px}
.question-stem{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:20px}
.options-list{display:flex;flex-direction:column;gap:10px}
.option-btn{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--card);cursor:pointer;text-align:left;font-size:.92rem;line-height:1.5;transition:all .15s}
.option-btn:active{transform:scale(.98)}
.option-btn.selected{border-color:#3b82f6;background:#eff6ff}
.option-btn.correct{border-color:var(--green);background:var(--green-light)}
.option-btn.wrong{border-color:var(--red);background:var(--red-light)}
.option-label{font-weight:700;font-size:.85rem;color:var(--text2);min-width:22px;flex-shrink:0}
.option-btn.correct .option-label{color:var(--green)}
.option-btn.wrong .option-label{color:var(--red)}
.option-btn.correct{animation:pulse .4s ease}
.option-btn.wrong{animation:shake .4s ease}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.explanation-box{margin-top:16px;padding:14px;border-radius:var(--radius-sm);font-size:.85rem;line-height:1.6}
.explanation-box.correct{background:var(--green-light);color:#15803d}
.explanation-box.wrong{background:var(--red-light);color:#991b1b}
.explanation-box .exp-label{font-weight:700;font-size:.78rem;margin-bottom:4px}

/* Progress Bar */
.progress-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s ease}

/* Study Header */
.study-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.study-header .counter{font-size:.85rem;color:var(--text2);font-weight:600}

/* Results */
.results-screen{text-align:center;padding:40px 20px}
.result-icon{font-size:4rem;margin-bottom:16px}
.results-screen h1{font-size:1.5rem;margin-bottom:20px}
.result-stats{display:flex;justify-content:center;gap:24px;margin-bottom:16px}
.result-stats .stat{text-align:center}
.result-stats .stat-value{font-size:1.8rem;font-weight:700}
.result-stats .stat.correct .stat-value{color:var(--green)}
.result-stats .stat.wrong .stat-value{color:var(--red)}
.result-stats .stat-label{font-size:.78rem;color:var(--text2)}
.accuracy{font-size:1.1rem;font-weight:600;margin-bottom:20px}

/* All Study Bar */
.all-study-bar{margin-bottom:20px}

/* Inputs, Selects */
.input, .select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.9rem;background:var(--card);color:var(--text);transition:border-color .15s}
.input:focus,.select:focus{outline:none;border-color:var(--green)}
.select-wrap{margin-bottom:12px}
.select-wrap label{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px;color:var(--text2)}
textarea.input{resize:vertical;min-height:80px}

/* Loading */
.loading{text-align:center;padding:30px;color:var(--text2)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Alerts */
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:.85rem;margin:12px 0}
.alert-error{background:var(--red-light);color:#991b1b}
.alert-success{background:var(--green-light);color:#15803d}

/* Empty State */
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-icon{font-size:3rem;margin-bottom:12px}
.empty-state h3{font-size:1.1rem;color:var(--text);margin-bottom:8px}

/* Settings */
.settings-section{margin-bottom:24px}
.settings-section label{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px;color:var(--text2)}
.settings-section .hint{font-size:.75rem;color:var(--text2);margin-top:4px}

/* Responsive */
@media (max-width:400px){
  .stats-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat-card{padding:12px 8px}
  .stat-card .stat-value{font-size:1.3rem}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ========== Storage ==========
const PREFIX = 'quiz_app_';
function load(key) { try { const r = localStorage.getItem(PREFIX+key); return r ? JSON.parse(r) : null; } catch { return null; } }
function save(key, val) { localStorage.setItem(PREFIX+key, JSON.stringify(val)); }
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ========== State ==========
let decks = load('decks') || [];
let questions = load('questions') || {}; // { deckId: [question, ...] }
const settings = {
  apiKey: (load('settings')||{}).apiKey || '',
  apiEndpoint: (load('settings')||{}).apiEndpoint || 'https://api.deepseek.com/v1/chat/completions',
  defaultCount: (load('settings')||{}).defaultQuestionCount || 10,
  githubToken: (load('settings')||{}).githubToken || '',
  syncGistId: (load('settings')||{}).syncGistId || ''
};
function persist(){ save('decks',decks); save('questions',questions); }
function persistSettings(){ save('settings',{apiKey:settings.apiKey,apiEndpoint:settings.apiEndpoint,defaultQuestionCount:settings.defaultCount,githubToken:settings.githubToken,syncGistId:settings.syncGistId}); }

// ========== Sync ==========
async function syncPush() {
  if(!settings.githubToken) throw new Error('请先在设置中填入 GitHub Token');
  const payload = JSON.stringify({decks:decks, questions:questions, updatedAt:Date.now()});
  let gistId = settings.syncGistId;
  let method = 'POST';
  let url = 'https://api.github.com/gists';
  if(gistId) { method = 'PATCH'; url += '/'+gistId; }
  const resp = await fetch(url, {
    method: method,
    headers: {'Authorization':'token '+settings.githubToken, 'Content-Type':'application/json', 'Accept':'application/vnd.github.v3+json'},
    body: JSON.stringify({description:'zhiti-sync-data',public:false,files:{'zhiti-data.json':{content:payload}}})
  });
  if(!resp.ok) { const e=await resp.json(); throw new Error(e.message||'同步失败 HTTP '+resp.status); }
  const data = await resp.json();
  if(!gistId) { settings.syncGistId = data.id; persistSettings(); }
  return data.id;
}

async function syncPull() {
  if(!settings.githubToken) throw new Error('请先在设置中填入 GitHub Token');
  let gistId = settings.syncGistId;
  if(!gistId) {
    // Find the sync gist
    const resp = await fetch('https://api.github.com/gists?per_page=100', {
      headers: {'Authorization':'token '+settings.githubToken, 'Accept':'application/vnd.github.v3+json'}
    });
    if(!resp.ok) throw new Error('无法获取 Gist 列表');
    const gists = await resp.json();
    for(const g of gists) {
      if(g.description==='zhiti-sync-data' && g.files && g.files['zhiti-data.json']) {
        gistId = g.id; settings.syncGistId = gistId; persistSettings(); break;
      }
    }
    if(!gistId) throw new Error('未找到云端数据，请先在另一台设备上执行「上传到云端」');
  }
  const resp = await fetch('https://api.github.com/gists/'+gistId, {
    headers: {'Authorization':'token '+settings.githubToken, 'Accept':'application/vnd.github.v3+json'}
  });
  if(!resp.ok) throw new Error('获取云端数据失败');
  const gist = await resp.json();
  const file = gist.files && gist.files['zhiti-data.json'];
  if(!file || !file.content) throw new Error('云端数据为空');
  const data = JSON.parse(file.content);
  decks = data.decks || [];
  questions = data.questions || {};
  persist();
  return {decks:decks.length, questions:Object.values(questions).flat().length, updatedAt:data.updatedAt};
}

// ========== Router ==========
let currentRoute = '/';
let routeParams = {};
const app = document.getElementById('app');

function navigate(path) {
  const match = path.match(/^\/(study|review)\/(.+)$/);
  if (match) {
    currentRoute = '/'+match[1];
    routeParams = { deckId: match[2] };
  } else {
    currentRoute = path;
    routeParams = {};
  }
  render();
  window.scrollTo(0,0);
}

// ========== Render Engine ==========
function render() { app.innerHTML = ''; if(currentRoute==='/') renderHome(); else if(currentRoute==='/import') renderImport(); else if(currentRoute==='/study') renderStudy(); else if(currentRoute==='/review') renderReview(); else if(currentRoute==='/decks') renderDecks(); else if(currentRoute==='/settings') renderSettings(); renderNav(); }

function renderNav() {
  const nav = document.createElement('nav');
  nav.className = 'bottom-nav';
  const items = [
    {path:'/',icon:'🏠',label:'首页'},
    {path:'/decks',icon:'📚',label:'题库'},
    {path:'/import',icon:'＋',label:'导入',add:true},
    {path:'/settings',icon:'⚙️',label:'设置'}
  ];
  items.forEach(it=>{
    const a = document.createElement('a');
    a.href='#';
    a.className='nav-item'+(currentRoute===it.path?' active':'');
    if(it.add) a.classList.add('add-btn');
    a.innerHTML = `<span class="nav-icon">${it.icon}</span><span class="nav-label">${it.label}</span>`;
    a.onclick=e=>{e.preventDefault();navigate(it.path);};
    nav.appendChild(a);
  });
  app.appendChild(nav);
}

// ========== Pages ==========

// --- Home ---
function renderHome() {
  const totalQ = Object.values(questions).flat().length;
  const allQ = Object.values(questions).flat();
  const mastered = allQ.filter(q=>q.status==='correct').length;
  const deckCount = decks.length;

  const div = document.createElement('div'); div.className='page home-page';
  div.innerHTML = `
    <header class="page-header"><h1>知题</h1><p class="subtitle">AI 驱动的选择题学习工具</p></header>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${deckCount}</div><div class="stat-label">题库</div></div>
      <div class="stat-card"><div class="stat-value">${totalQ}</div><div class="stat-label">总题数</div></div>
      <div class="stat-card"><div class="stat-value">${totalQ?Math.round(mastered/totalQ*100):0}%</div><div class="stat-label">掌握率</div></div>
    </div>
  `;
  if(totalQ>0){
    const bar = document.createElement('div'); bar.className='all-study-bar';
    bar.innerHTML = `<a href="#" class="btn btn-primary btn-lg">学习全部题目 (${totalQ} 题)</a>`;
    bar.querySelector('a').onclick=e=>{e.preventDefault();navigate('/study/all');};
    div.appendChild(bar);
  }
  const sec = document.createElement('section');
  sec.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h2 style="font-size:1.1rem">我的题库</h2><a href="#" style="color:var(--green);font-size:.85rem;text-decoration:none">查看全部</a></div>`;
  sec.querySelector('a').onclick=e=>{e.preventDefault();navigate('/decks');};
  if(decks.length===0) {
    sec.innerHTML += '<div class="empty-state"><div class="empty-icon">📭</div><h3>还没有题库</h3><p>导入文档，AI 帮你出题</p><a href="#" class="btn btn-primary" style="margin-top:16px;display:inline-flex">导入文档</a></div>';
    sec.querySelector('.btn').onclick=e=>{e.preventDefault();navigate('/import');};
  } else {
    decks.slice(0,5).forEach(d=>{
      const qs = questions[d.id]||[];
      const correct = qs.filter(q=>q.status==='correct').length;
      const item = document.createElement('div'); item.className='deck-item';
      item.innerHTML = `<div class="deck-info"><div class="deck-name">${escHtml(d.name)}</div><div class="deck-meta"><span>${qs.length} 题</span><span>正确率 ${qs.length?Math.round(correct/qs.length*100):0}%</span></div></div><div class="deck-actions"><button class="btn-study">学习</button><button class="btn-delete">删除</button></div>`;
      item.querySelector('.btn-study').onclick=e=>{e.stopPropagation();navigate('/study/'+d.id);};
      item.querySelector('.btn-delete').onclick=e=>{e.stopPropagation();if(confirm('删除题库 "'+d.name+'"？')){delete questions[d.id];decks=decks.filter(x=>x.id!==d.id);persist();renderHome();renderNav();}};
      item.onclick=()=>navigate('/study/'+d.id);
      sec.appendChild(item);
    });
  }
  div.appendChild(sec);
  app.appendChild(div);
}

// --- Import ---
function renderImport() {
  let step = 'upload'; // upload | parsing | preview | generating | done
  let file = null, parsedText = '', errorMsg = '';
  let generatedQuestions = [];

  const div = document.createElement('div'); div.className='page import-page';
  div.innerHTML = `<header class="page-header"><h1>导入文档</h1><p class="subtitle">上传 Word/PDF/TXT，DeepSeek AI 自动生成选择题</p></header><div id="import-content"></div>`;
  app.appendChild(div);
  const content = div.querySelector('#import-content');

  function renderStep() {
    content.innerHTML = '';
    if (step==='upload') renderUpload();
    else if (step==='parsing') renderParsing();
    else if (step==='preview') renderPreview();
    else if (step==='generating') renderGenerating();
    else if (step==='done') renderDone();
  }

  function renderUpload() {
    content.innerHTML = `
      <div class="upload-zone" id="dropZone">
        <div class="upload-icon">📤</div>
        <h3>拖拽文件到此处</h3>
        <p>或点击选择文件（.docx / .txt / .pdf）</p>
        <input type="file" id="fileInput" accept=".docx,.txt,.pdf">
      </div>
      ${errorMsg ? '<div class="alert alert-error">'+escHtml(errorMsg)+'</div>' : ''}
    `;
    const zone = content.querySelector('#dropZone');
    const input = content.querySelector('#fileInput');
    zone.onclick = ()=>input.click();
    zone.ondragover = e=>{e.preventDefault();zone.classList.add('active');};
    zone.ondragleave = ()=>zone.classList.remove('active');
    zone.ondrop = async e=>{
      e.preventDefault(); zone.classList.remove('active');
      const f = e.dataTransfer.files[0];
      if(f) await processFile(f);
    };
    input.onchange = async ()=>{
      if(input.files[0]) await processFile(input.files[0]);
    };
  }

  function renderParsing() {
    content.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在解析文档...</p></div>';
  }

  function renderPreview() {
    const preview = parsedText.slice(0,2000);
    content.innerHTML = `
      <div class="select-wrap"><label>题库名称</label><input class="input" id="deckNameInput" value="${escHtml(file.name.replace(/\.[^.]+$/,''))}"></div>
      <div class="select-wrap"><label>题目数量</label><select class="select" id="questionCount"><option value="5">5 题</option><option value="10" selected>10 题</option><option value="15">15 题</option><option value="20">20 题</option></select></div>
      <div style="font-size:.82rem;color:var(--text2);font-weight:600;margin-bottom:6px">文档预览</div>
      <div class="preview-box">${escHtml(preview)}${parsedText.length>2000?'\n...(共 '+parsedText.length+' 字符)':''}</div>
      <button class="btn btn-primary btn-block" id="genBtn">AI 生成题目</button>
      ${errorMsg ? '<div class="alert alert-error">'+escHtml(errorMsg)+'</div>' : ''}
    `;
    content.querySelector('#genBtn').onclick = ()=>startGenerate();
  }

  function renderGenerating() {
    content.innerHTML = '<div class="loading"><div class="spinner"></div><p>DeepSeek AI 正在生成题目...</p><p style="font-size:.8rem;color:var(--text2);margin-top:8px">可能需要 10-30 秒</p></div>';
  }

  function renderDone() {
    content.innerHTML = `
      <div class="alert alert-success">已生成 ${generatedQuestions.length} 道选择题</div>
      <div style="max-height:400px;overflow-y:auto">
        ${generatedQuestions.map((q,i)=>`
          <div class="card" style="font-size:.85rem">
            <div style="font-weight:600;margin-bottom:8px">${i+1}. ${escHtml(q.stem)}</div>
            ${q.options.map((o,j)=>`<div style="padding:4px 0;color:${j===q.correctIndex?'var(--green)':'var(--text2)'}">${'ABCD'[j]}. ${escHtml(o)}${j===q.correctIndex?' ✓':''}</div>`).join('')}
            <div style="margin-top:8px;font-size:.78rem;color:var(--text2)">${escHtml(q.explanation||'')}</div>
          </div>
        `).join('')}
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="retryBtn">重新导入</button>
        <button class="btn btn-primary" id="saveBtn">保存并开始学习</button>
      </div>
    `;
    content.querySelector('#retryBtn').onclick = ()=>{step='upload';errorMsg='';renderStep();};
    content.querySelector('#saveBtn').onclick = ()=>{
      const deckId = genId();
      const deckName = file ? file.name.replace(/\.[^.]+$/,'') : '未命名题库';
      decks.push({id:deckId,name:deckName,createdAt:Date.now()});
      questions[deckId] = generatedQuestions.map(q=>({...q,id:genId(),deckId,status:'new'}));
      persist();
      navigate('/study/'+deckId);
    };
  }

  async function processFile(f) {
    if(!f) return;
    errorMsg = ''; file = f; step = 'parsing'; renderStep();
    try {
      const ext = f.name.split('.').pop().toLowerCase();
      if(ext === 'txt') {
        parsedText = await f.text();
      } else if(ext === 'docx') {
        if(typeof mammoth === 'undefined') throw new Error('mammoth.js 未加载，请检查网络连接');
        const result = await mammoth.extractRawText({arrayBuffer: await f.arrayBuffer()});
        parsedText = result.value;
      } else if(ext === 'pdf') {
        parsedText = await parsePdfText(f);
      } else {
        throw new Error('不支持的格式: .'+ext);
      }
      if(!parsedText.trim()) throw new Error('文档内容为空或无法识别');
      step = 'preview'; renderStep();
    } catch(err) {
      errorMsg = '解析失败: '+err.message; step = 'upload'; renderStep();
    }
  }

  async function parsePdfText(file) {
    // Fallback: read raw text from PDF (limited but works for simple PDFs)
    // For complex PDFs, the text extraction will be limited
    const buf = await file.arrayBuffer();
    // Try basic text extraction from PDF binary
    const text = new TextDecoder().decode(buf);
    // Extract text between stream/endstream markers (basic)
    const parts = [];
    const regex = /\/Text\s*<([^>]+)>/gi;
    let m;
    while((m=regex.exec(text))!==null) {
      try {
        parts.push(m[1].replace(/([0-9A-F]{2})/g,(_,h)=>String.fromCharCode(parseInt(h,16))));
      } catch{}
    }
    if(parts.length>0) return parts.join('\n');
    // Very basic: just get readable ASCII sequences
    const readable = text.replace(/[^\x20-\x7E一-鿿　-〿＀-￯\n\r]/g,' ').replace(/\s{2,}/g,'\n').trim();
    return readable.slice(0, 50000);
  }

  async function startGenerate() {
    const deckNameInput = content.querySelector('#deckNameInput');
    const questionCount = parseInt(content.querySelector('#questionCount').value);
    const deckName = deckNameInput ? deckNameInput.value.trim() : (file.name.replace(/\.[^.]+$/,''));
    if(!deckName) { errorMsg = '请输入题库名称'; renderStep(); return; }
    if(!settings.apiKey) { errorMsg = '请先在设置页填入 DeepSeek API Key'; renderStep(); return; }
    step = 'generating'; renderStep();
    try {
      generatedQuestions = await callDeepSeek(parsedText, questionCount);
      step = 'done'; renderStep();
    } catch(err) {
      errorMsg = 'AI 生成失败: '+err.message; step = 'preview'; renderStep();
    }
  }

  renderStep();
}

async function callDeepSeek(text, count) {
  const systemPrompt = `你是一个专业的题目生成器。从用户提供的文本中识别关键知识点，为每个知识点生成一道高质量的四选一选择题。

要求：
1. 提取文本中最值得学习的 ${count} 个知识点
2. 每题 4 个选项，只有 1 个正确答案
3. 错误选项要有迷惑性（不能明显错误）
4. 每题附带详细解析，解释为什么正确选项是对的
5. 返回纯 JSON 格式，不要有任何 markdown 标记

返回 JSON 格式：
{
  "questions": [
    {
      "stem": "题目题干（完整的知识点问题）",
      "options": ["选项A内容", "选项B内容", "选项C内容", "选项D内容"],
      "correctIndex": 0,
      "knowledge": "考察的知识点名称",
      "explanation": "详细解析，说明正确答案的原因"
    }
  ]
}`;

  const resp = await fetch(settings.apiEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+settings.apiKey },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: '请根据以下文本生成 '+count+' 道选择题：\n\n'+text.slice(0,15000) }
      ],
      temperature: 0.7,
      max_tokens: 8192,
      response_format: { type: 'json_object' }
    })
  });
  if(!resp.ok) throw new Error('API 请求失败: HTTP '+resp.status+' — 请检查 API Key 是否正确');
  const data = await resp.json();
  const content = data.choices[0].message.content;
  return parseAIResponse(content, count);
}

function parseAIResponse(content, expectedCount) {
  let text = content.trim();
  // Remove markdown code blocks
  const codeMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(codeMatch) text = codeMatch[1].trim();

  // Try direct parse
  try {
    const obj = JSON.parse(text);
    if(obj.questions) return obj.questions.slice(0,expectedCount);
    if(Array.isArray(obj)) return obj.slice(0,expectedCount);
  } catch{}

  // Try to extract questions array
  const arrMatch = text.match(/"questions"\s*:\s*\[/);
  if(arrMatch) {
    const slice = extractBrackets(text, arrMatch.index + arrMatch[0].length - 1);
    if(slice) { try { return JSON.parse(slice).slice(0,expectedCount); } catch{} }
  }

  // Try any JSON array
  const anyArr = text.match(/\[/);
  if(anyArr) {
    const slice = extractBrackets(text, anyArr.index);
    if(slice) { try { const arr=JSON.parse(slice); if(arr.length) return arr.slice(0,expectedCount); } catch{} }
  }

  throw new Error('无法解析 AI 返回的题目，请重试');
}

function extractBrackets(text, start) {
  let depth=0, inStr=false, esc=false;
  for(let i=start;i<text.length;i++){
    const ch=text[i];
    if(esc){esc=false;continue}
    if(ch==='\\'){esc=true;continue}
    if(ch==='"'){inStr=!inStr;continue}
    if(inStr)continue;
    if(ch==='['){depth++}
    else if(ch===']'){depth--;if(depth===0)return text.slice(start,i+1)}
  }
  return null;
}

// --- Study ---
function renderStudy() {
  const deckId = routeParams.deckId;
  const isAllMode = deckId === 'all';
  const deck = isAllMode ? {id:'all',name:'全部题目'} : decks.find(d=>d.id===deckId);

  if(!deck && !isAllMode) { navigate('/'); return; }

  let rawQuestions = isAllMode ? Object.values(questions).flat() : (questions[deckId]||[]);
  if(rawQuestions.length===0) { navigate('/'); return; }

  // Shuffle and randomize options
  let studyQuestions = shuffle([...rawQuestions]).map(q=>{
    const correct = q.options[q.correctIndex];
    const shuffled = shuffle([...q.options]);
    return {...q, options:shuffled, correctIndex:shuffled.indexOf(correct)};
  });

  let currentIndex = 0;
  let correctCount = 0;
  let answered = false;
  let showResults = false;

  const div = document.createElement('div'); div.className='page study-page';
  app.appendChild(div);

  function renderQuiz() {
    if(showResults) { renderResults(); return; }
    const q = studyQuestions[currentIndex];
    if(!q) { renderResults(); return; }

    const progress = ((currentIndex)/studyQuestions.length)*100;
    div.innerHTML = `
      <div class="study-header">
        <button class="btn-back" id="exitBtn">退出</button>
        <span style="font-weight:600;font-size:.9rem">${escHtml(deck.name)}</span>
        <span class="counter">${currentIndex+1}/${studyQuestions.length}</span>
      </div>
      <div class="progress-wrap"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="quiz-card">
        <div class="question-stem">${escHtml(q.stem)}</div>
        <div class="options-list" id="optionsList">
          ${q.options.map((o,i)=>`
            <div class="option-btn" data-index="${i}">
              <span class="option-label">${'ABCD'[i]}</span>
              <span>${escHtml(o)}</span>
            </div>
          `).join('')}
        </div>
        <div id="explanationArea"></div>
      </div>
    `;

    div.querySelector('#exitBtn').onclick = ()=>{if(confirm('确定退出？当前进度不会保存。'))navigate('/');};

    const optionBtns = div.querySelectorAll('.option-btn');
    optionBtns.forEach(btn=>{
      btn.onclick = ()=>{
        if(answered) return;
        answered = true;
        const idx = parseInt(btn.dataset.index);
        const correct = idx === q.correctIndex;
        if(correct) correctCount++;

        // Highlight
        optionBtns.forEach(b=>{
          const bi = parseInt(b.dataset.index);
          if(bi === q.correctIndex) b.classList.add('correct');
          else if(bi === idx && !correct) b.classList.add('wrong');
          b.style.pointerEvents = 'none';
        });

        // Explanation
        const expArea = div.querySelector('#explanationArea');
        expArea.innerHTML = `
          <div class="explanation-box ${correct?'correct':'wrong'}">
            <div class="exp-label">${correct?'回答正确':'回答错误'}</div>
            <div>${escHtml(q.explanation||(correct?'继续加油！':'正确答案是 ' + 'ABCD'[q.correctIndex] + '. ' + q.options[q.correctIndex]))}</div>
          </div>
        `;

        // Next question or results
        setTimeout(()=>{
          if(currentIndex < studyQuestions.length-1) {
            currentIndex++; answered=false; renderQuiz();
          } else {
            showResults=true; renderQuiz();
          }
        }, correct?1000:2000);
      };
    });
  }

  function renderResults() {
    const total = studyQuestions.length;
    const wrong = total - correctCount;
    const accuracy = Math.round(correctCount/total*100);

    div.innerHTML = `
      <div class="results-screen">
        <div class="result-icon">${accuracy>=80?'🎉':'💪'}</div>
        <h1>学习完成</h1>
        <div class="result-stats">
          <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">总题数</div></div>
          <div class="stat correct"><div class="stat-value">${correctCount}</div><div class="stat-label">正确</div></div>
          <div class="stat wrong"><div class="stat-value">${wrong}</div><div class="stat-label">错误</div></div>
        </div>
        <p class="accuracy">正确率 ${accuracy}%</p>
        <div class="btn-group" style="justify-content:center">
          ${wrong>0?`<button class="btn btn-secondary" id="reviewWrongBtn">复习错题 (${wrong})</button>`:''}
          <button class="btn btn-primary" id="restartBtn">重新学习</button>
          <button class="btn btn-secondary" id="homeBtn">返回首页</button>
        </div>
      </div>
    `;

    const restart = ()=>{
      studyQuestions = shuffle([...rawQuestions]).map(q=>{
        const correct = q.options[q.correctIndex];
        const shuffled = shuffle([...q.options]);
        return {...q, options:shuffled, correctIndex:shuffled.indexOf(correct)};
      });
      currentIndex=0; correctCount=0; answered=false; showResults=false; renderQuiz();
    };

    // Update question statuses
    studyQuestions.forEach(q=>{
      if(questions[q.deckId]) {
        const orig = questions[q.deckId].find(x=>x.id===q.id);
        if(orig) {
          const wasCorrect = studyQuestions.indexOf(q) < studyQuestions.length &&
            q.correctIndex === studyQuestions[studyQuestions.indexOf(q)]?.correctIndex;
        }
      }
    });

    div.querySelector('#restartBtn')?.addEventListener('click', restart);
    div.querySelector('#homeBtn')?.addEventListener('click', ()=>navigate('/'));
    div.querySelector('#reviewWrongBtn')?.addEventListener('click', ()=>{
      navigate(isAllMode?'/review/all':'/review/'+deckId);
    });
  }

  renderQuiz();
}

// --- Review ---
function renderReview() {
  const deckId = routeParams.deckId;
  const isAllMode = deckId === 'all';

  if(!isAllMode && !decks.find(d=>d.id===deckId)) { navigate('/'); return; }

  const source = isAllMode ? Object.values(questions).flat() : (questions[deckId]||[]);
  const wrongQuestions = source.filter(q=>q.status==='wrong').map(q=>{
    const correct = q.options[q.correctIndex];
    const shuffled = shuffle([...q.options]);
    return {...q, options:shuffled, correctIndex:shuffled.indexOf(correct)};
  });

  let currentIndex = 0;
  let answered = false;
  let finished = false;

  const div = document.createElement('div'); div.className='page review-page';
  app.appendChild(div);

  function renderReviewQuiz() {
    if(wrongQuestions.length===0 || finished) {
      div.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🎉</div>
          <h3>${finished?'错题复习完成':'没有错题'}</h3>
          <p>${finished?'你已经掌握了所有错题':'去学习吧，答错的题会出现在这里'}</p>
          <div class="btn-group" style="justify-content:center;margin-top:16px">
            <a href="#" class="btn btn-primary" id="backStudyBtn">${finished?'重新学习':'返回首页'}</a>
          </div>
        </div>
      `;
      div.querySelector('#backStudyBtn').onclick=e=>{
        e.preventDefault();
        navigate(finished?(isAllMode?'/study/all':'/study/'+deckId):'/');
      };
      return;
    }

    const q = wrongQuestions[currentIndex];
    const progress = (currentIndex/wrongQuestions.length)*100;
    const backRoute = isAllMode?'/study/all':'/study/'+deckId;

    div.innerHTML = `
      <div class="study-header">
        <button class="btn-back" id="backBtn">返回</button>
        <span style="font-weight:600;font-size:.9rem">错题复习${isAllMode?' · 全部':''}</span>
        <span class="counter">${currentIndex+1}/${wrongQuestions.length}</span>
      </div>
      <div class="progress-wrap"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="quiz-card">
        <div class="question-stem">${escHtml(q.stem)}</div>
        <div class="options-list" id="optionsList">
          ${q.options.map((o,i)=>`
            <div class="option-btn" data-index="${i}">
              <span class="option-label">${'ABCD'[i]}</span>
              <span>${escHtml(o)}</span>
            </div>
          `).join('')}
        </div>
        <div id="explanationArea"></div>
      </div>
    `;

    div.querySelector('#backBtn').onclick = ()=>navigate(backRoute);

    const optionBtns = div.querySelectorAll('.option-btn');
    optionBtns.forEach(btn=>{
      btn.onclick = ()=>{
        if(answered) return;
        answered = true;
        const idx = parseInt(btn.dataset.index);
        const correct = idx === q.correctIndex;

        optionBtns.forEach(b=>{
          const bi = parseInt(b.dataset.index);
          if(bi === q.correctIndex) b.classList.add('correct');
          else if(bi === idx && !correct) b.classList.add('wrong');
          b.style.pointerEvents = 'none';
        });

        const expArea = div.querySelector('#explanationArea');
        expArea.innerHTML = `
          <div class="explanation-box ${correct?'correct':'wrong'}">
            <div class="exp-label">${correct?'回答正确':'回答错误'}</div>
            <div>${escHtml(q.explanation||'正确答案是 ' + 'ABCD'[q.correctIndex] + '. ' + q.options[q.correctIndex])}</div>
          </div>
        `;

        // If correct, remove from wrong list
        if(correct) {
          const origQ = questions[q.deckId]?.find(x=>x.id===q.id);
          if(origQ) origQ.status = 'correct';
          persist();
        }

        setTimeout(()=>{
          if(currentIndex < wrongQuestions.length-1) {
            currentIndex++; answered=false; renderReviewQuiz();
          } else {
            finished=true; renderReviewQuiz();
          }
        }, correct?1000:2000);
      };
    });
  }

  renderReviewQuiz();
}

// --- Decks ---
function renderDecks() {
  const totalQ = Object.values(questions).flat().length;
  const div = document.createElement('div'); div.className='page decks-page';
  div.innerHTML = `
    <header class="page-header"><h1>题库管理</h1><p class="subtitle">${decks.length} 个题库</p></header>
  `;
  if(totalQ>0){
    const bar = document.createElement('div'); bar.className='all-study-bar';
    bar.innerHTML = `<a href="#" class="btn btn-primary btn-lg">学习全部题目 (${totalQ} 题)</a>`;
    bar.querySelector('a').onclick=e=>{e.preventDefault();navigate('/study/all');};
    div.appendChild(bar);
  }
  if(decks.length===0){
    div.innerHTML += '<div class="empty-state"><div class="empty-icon">📭</div><h3>还没有题库</h3><p>去导入页面，上传文档让 AI 帮你出题</p></div>';
  } else {
    decks.forEach(d=>{
      const qs = questions[d.id]||[];
      const correct = qs.filter(q=>q.status==='correct').length;
      const wrong = qs.filter(q=>q.status==='wrong').length;
      const item = document.createElement('div'); item.className='deck-item';
      item.innerHTML = `
        <div class="deck-info">
          <div class="deck-name">${escHtml(d.name)}</div>
          <div class="deck-meta"><span>${qs.length} 题</span><span>正确 ${correct}</span><span>错误 ${wrong}</span><span>正确率 ${qs.length?Math.round(correct/qs.length*100):0}%</span></div>
        </div>
        <div class="deck-actions"><button class="btn-study">学习</button><button class="btn-delete">删除</button></div>
      `;
      item.querySelector('.btn-study').onclick=e=>{e.stopPropagation();navigate('/study/'+d.id);};
      item.querySelector('.btn-delete').onclick=e=>{
        e.stopPropagation();
        if(confirm('确定删除题库 "'+d.name+'"？所有题目将被永久删除。')){
          delete questions[d.id]; decks=decks.filter(x=>x.id!==d.id); persist(); renderDecks(); renderNav();
        }
      };
      item.onclick=()=>navigate('/study/'+d.id);
      div.appendChild(item);
    });
  }
  app.appendChild(div);
}

// ========== Utils ==========
function escHtml(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
